<!DOCTYPE html>
<html lang="pt-br">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Fausto Candido</title>

  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&display=swap"
    rel="stylesheet">

  <script src="https://unpkg.com/lucide@latest"></script>

  <link rel="stylesheet" href="css/style.css" />

   <!-- SEO -->
  <meta name="description"
    content="Perfil oficial de Fausto Candido - Links importantes, redes sociais e atividades." />
  <meta name="keywords" content="fausto, faustocps, perfil, redes sociais, idade, strava" />
  <meta name="author" content="Fausto Candido" />

  <!-- Open Graph (Facebook, LinkedIn, etc) -->
  <meta property="og:title" content="Fausto Candido" />
  <meta property="og:description" content="Acesse meus links, atividades físicas e redes sociais." />
  <meta property="og:image" content="https://faustocps.com.br/assets/profile.webp" />
  <meta property="og:url" content="https://faustocps.com.br" />
  <meta property="og:type" content="website" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="/assets/summary_large_image.png" />
  <meta name="twitter:title" content="Fausto Candido" />
  <meta name="twitter:description" content="Acesse meus links, atividades físicas e redes sociais." />
  <meta name="twitter:image" content="https://faustocps.com.br/assets/profile.webp" />

</head>

<body>
  <main class="container">

    <div class="profile">

      <img class="profile-pic" src="assets/profile.webp" alt="Foto de perfil de Fausto Candido" loading="lazy"
        width="150" height="150" />

      <h1>Fausto Candido</h1>
      <p>@faustocps</p>

    </div>


    <div class="links">

      <a class="link" href="https://instagram.com/faustocps" target="_blank" rel="noopener noreferrer">
        <div class="left">
          <i data-lucide="instagram"></i>
          <span>Instagram</span>
        </div>
        <i data-lucide="arrow-up-right"></i>
      </a>

      <a class="link" href="http://twitter.com/faustocps" target="_blank" rel="noopener noreferrer">
        <div class="left">
          <i data-lucide="twitter"></i>
          <span>Twitter</span>
        </div>
        <i data-lucide="arrow-up-right"></i>
      </a>

      <a class="link" href="https://linkedin.com/in/faustocps" target="_blank" rel="noopener noreferrer">
        <div class="left">
          <i data-lucide="linkedin"></i>
          <span>LinkedIn</span>
        </div>
        <i data-lucide="arrow-up-right"></i>
      </a>

      <a class="link" href="https://strava.com/athletes/faustocps" target="_blank" rel="noopener noreferrer">
        <div class="left">
          <i data-lucide="bike"></i>
          <span>Strava</span>
        </div>
        <i data-lucide="arrow-up-right"></i>
      </a>

    </div>

    <script>
      lucide.createIcons();
    </script>

  </main>
 
</body>
<footer>
  <div class="text-age" id="age"></div>
  <script src="js/main.js"></script>
</footer>

</html>
